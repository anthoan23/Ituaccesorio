<!doctype html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ituaccesorio</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(135deg, #f7f7f7, #e9eef5);
			color: #1b2638;
		}
		.card {
			background: #ffffff;
			padding: 2rem 2.5rem;
			border-radius: 12px;
			box-shadow: 0 10px 30px rgba(27, 38, 56, 0.12);
			text-align: center;
		}
		h1 {
			margin: 0 0 0.75rem;
			font-size: 1.8rem;
		}
		p {
			margin: 0;
			font-size: 1rem;
			color: #415064;
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Ituaccesorio</h1>
		<p>{{ mensaje }}</p>
	</main>
</body>
</html>
