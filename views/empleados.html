<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados - Ituaccesorio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/empleados.css') }}">
</head>
<body>
    <input class="nav-toggle" type="checkbox" id="nav-toggle" aria-hidden="true">

    <header class="topbar">
        <div class="topbar__left">
            <label class="hamburger" for="nav-toggle" aria-label="Abrir menú" role="button" tabindex="0">
                <span class="hamburger__icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </label>

            <a class="brand" href="/" aria-label="Ir al inicio">
                <img class="brand__logo" src="{{ url_for('static', filename='img/LOGO TRAZO BLANCO.png') }}" alt="Ituaccesorio">
            </a>
        </div>

        <div class="topbar__right">
            <div class="user" aria-label="Usuario activo">
                <span class="user__avatar" aria-hidden="true"></span>
                <div class="user__meta">
                    <strong class="user__name">JUAN CHACÓN</strong>
                    <span class="user__role">Administrador</span>
                </div>
            </div>
        </div>
    </header>

    <label class="backdrop" for="nav-toggle" aria-label="Cerrar menú"></label>

    <aside class="drawer" aria-label="Menú lateral">
        <div class="drawer__header">
            <span class="drawer__title">Menú</span>
        </div>
        <nav class="drawer__nav">
            <a class="drawer__link" href="/">Dashboard</a>
            <a class="drawer__link is-active" href="{{ url_for('empleados.pagina_empleados') }}">Empleados</a>
            <a class="drawer__link" href="{{ url_for('prueba.pagina_prueba') }}">Prueba DBs</a>
            <a class="drawer__link" href="{{ url_for('telefonos.pagina_telefonos') }}">Teléfonos</a>
        </nav>
    </aside>

    <main class="page">
        <section class="grid">
            <article class="card" aria-label="Acciones rápidas">
                <h2 class="card__title">Acciones rápidas</h2>

                <div class="quick">
                    <div class="quick__row">
                        <button id="btn-registrar" class="btn btn--yellow" type="button">
                            <span class="btn__icon" aria-hidden="true">+</span>
                            Registrar empleado
                        </button>
                        <button id="btn-busqueda" class="btn btn--yellow" type="button">
                            <span class="btn__icon" aria-hidden="true">⌕</span>
                            Búsqueda avanzada
                        </button>
                    </div>

                    <button id="btn-reporte" class="btn btn--dark btn--wide" type="button">Crear reporte de empleados</button>

                    <div id="panel-filtros" class="filters" hidden>
                        <div class="filters__grid">
                            <label>
                                <span>Cédula</span>
                                <input type="text" id="f-cedula" placeholder="Ej: 32014015">
                            </label>
                        </div>
                        <div class="filters__actions">
                            <button id="btn-aplicar" class="btn btn--ghost" type="button">Aplicar</button>
                            <button id="btn-limpiar" class="btn btn--ghost" type="button">Limpiar</button>
                        </div>
                    </div>
                </div>
            </article>

            <article class="card" aria-label="Actividad reciente">
                <h2 class="card__title">Actividad reciente de empleados y registros</h2>
                <ul id="lista-logs" class="logs"></ul>
            </article>

            <article class="card card--table" aria-label="Empleados existentes">
                <div class="table__header">
                    <h2 class="card__title">Empleados existentes</h2>
                    <div class="pager" aria-label="Paginación">
                        <button class="pager__btn" type="button" data-page="prev" aria-label="Anterior">‹</button>
                        <span id="pager-pages" class="pager__pages">1</span>
                        <button class="pager__btn" type="button" data-page="next" aria-label="Siguiente">›</button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Cédula</th>
                                <th>Nombre</th>
                                <th>Cargo</th>
                                <th class="table__actions">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-empleados"></tbody>
                    </table>
                </div>
            </article>
        </section>

        <section id="modal" class="modal" aria-hidden="true">
            <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
                <div class="modal__header">
                    <h3 id="modal-title" class="modal__title">Registrar empleado</h3>
                    <button id="modal-cerrar" class="modal__close" type="button" aria-label="Cerrar">×</button>
                </div>

                <form id="form-empleado" class="form" autocomplete="off">
                    <div class="form__grid">
                        <label>
                            <span>Cédula</span>
                            <input name="cedula" type="number" placeholder="32014015" required>
                        </label>
                        <label>
                            <span>Nombre</span>
                            <input name="nombre" type="text" placeholder="Juan" required>
                        </label>
                        <label>
                            <span>Apellido</span>
                            <input name="apellido" type="text" placeholder="Chacón" required>
                        </label>
                        <label>
                            <span>Celular</span>
                            <div class="phone">
                                <select name="celular_prefijo" aria-label="Prefijo">
                                    <option value="0414">0414</option>
                                    <option value="0424">0424</option>
                                    <option value="0412">0412</option>
                                    <option value="0422">0422</option>
                                    <option value="0416">0416</option>
                                    <option value="0426">0426</option>
                                </select>
                                <input name="celular_numero" type="text" inputmode="numeric" placeholder="0000000">
                            </div>
                        </label>
                        <label class="form__full">
                            <span>Correo</span>
                            <input name="correo" type="email" placeholder="correo@ejemplo.com">
                        </label>
                        <label class="form__full">
                            <span>Dirección</span>
                            <input name="direccion" type="text" placeholder="Calle..., Ciudad">
                        </label>
                        <label class="form__full">
                            <span>Cargo</span>
                            <input name="rol" type="text" placeholder="Técnico / Ventas / ...">
                        </label>
                    </div>

                    <div class="form__actions">
                        <button id="btn-guardar" class="btn btn--yellow" type="submit">Guardar</button>
                        <button id="btn-cancelar" class="btn btn--ghost" type="button">Cancelar</button>
                    </div>
                </form>
            </div>
        </section>

        <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="{{ url_for('static', filename='js/empleados.js') }}"></script>
</body>
</html>
